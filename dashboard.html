<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Student Dashboard</h1>
            <button onclick="logout()" style="background-color: #dc3545;">Logout</button>
        </div>
        
        <p>Welcome! You are securely logged in.</p>

        <section>
            <h2>Available Courses</h2>
            <div id="courses">Loading available courses...</div>
        </section>

        <section>
            <h2>My Enrolled Courses</h2>
            <div id="enrolled">Loading your courses...</div>
        </section>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function logout() {
            try {
                await fetch('php/auth/logout.php', { method: 'POST' });
            } catch (e) { }
            window.location.href = 'login.php';
        }
    </script>
</body>
</html>
